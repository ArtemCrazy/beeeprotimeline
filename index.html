<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeeePro Redesign Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=2">
</head>
<body>
  <div class="app-frame">
    <div class="site-shell">
      <main class="page-content">
        <section class="hero">
          <h1>BeeePro Redesign Timeline</h1>
        </section>

        <section class="board-panel">
          <div class="panel-head board-head">
            <div>
              <h2>Спринты по неделям</h2>
            </div>
          </div>
          <div class="board-scroll">
            <div class="timeline-board" id="timelineBoard"></div>
          </div>
        </section>

        <section class="pool-panel">
          <div class="panel-head">
            <div>
              <h2>Карточки для планирования</h2>
            </div>
            <button class="ghost-button" type="button" id="addCardBtn">Добавить карточку</button>
          </div>
          <div class="pool-grid" id="poolGrid"></div>
        </section>
      </main>
    </div>
  </div>

  <template id="cardTemplate">
    <button class="task-card" type="button" draggable="true"></button>
  </template>

  <script src="./script.js?v=2"></script>
</body>
</html>
